<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>House Price Predictor</title>
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero card">
        <div class="hero-copy">
          <p class="eyebrow">Indian House Pricing MLOps</p>
          <h1>Enter property details and get one price prediction.</h1>
          <p class="lede">This page uses plain inputs only. No CSV upload. Fill the form and click Predict.</p>
        </div>
        <div class="hero-metric">
          <span class="metric-label">Live estimate</span>
          <span class="metric-value">Instant</span>
          <span class="metric-note">Powered by the trained regression model</span>
        </div>
      </section>

      <section class="card">
        <form id="predict-form" class="grid-form">
          <label>
            Property type
            <select name="propertyType">
              <option>Multistorey Apartment</option>
              <option>Residential House</option>
              <option>Builder Floor Apartment</option>
              <option>Villa</option>
              <option>Other</option>
            </select>
          </label>

          <label>
            City
            <input name="city" type="text" value="Patna" />
          </label>

          <label>
            Locality
            <input name="locality" type="text" value="Kumhrar" />
          </label>

          <label>
            Posted on
            <input name="postedOn" type="text" value="Jun 20, '23" placeholder="Jun 20, '23" />
          </label>

          <label>
            Carpet area
            <input name="carpetArea" type="number" step="0.01" value="900" />
          </label>

          <label>
            Carpet area unit
            <select name="carpetAreaUnit">
              <option>Sq-ft</option>
              <option>Sq-yrd</option>
              <option>Sq-m</option>
              <option>Kanal</option>
              <option>Marla</option>
              <option>Biswa1</option>
              <option>Biswa2</option>
              <option>Rood</option>
              <option>Acre</option>
            </select>
          </label>

          <label>
            Furnishing
            <select name="furnishing">
              <option>Semi-Furnished</option>
              <option>Furnished</option>
              <option>Unfurnished</option>
            </select>
          </label>

          <label>
            Floor number
            <input name="flrNum" type="text" value="1" />
          </label>

          <label>
            Total floors
            <input name="totalFlrNum" type="number" step="1" value="5" />
          </label>

          <label>
            Bedrooms
            <input name="bedrooms" type="number" step="1" value="2" />
          </label>

          <label>
            Bathrooms
            <input name="bathrooms" type="number" step="1" value="2" />
          </label>

          <label>
            Balconies
            <input name="balconies" type="number" step="1" value="1" />
          </label>

          <label>
            Security deposit
            <input name="securityDeposit" type="number" step="0.01" value="12000" />
          </label>

          <label>
            Maintenance charges
            <input name="maintenanceCharges" type="number" step="0.01" value="1500" />
          </label>

          <label>
            Maintenance frequency
            <select name="maintenanceChargesFrequency">
              <option>Monthly</option>
              <option>Quarterly</option>
              <option>Yearly</option>
              <option>9</option>
            </select>
          </label>

          <label>
            First month charges
            <input name="firstMonthCharges" type="number" step="0.01" value="0" />
          </label>

          <label>
            Brokerage
            <input name="brokerage" type="number" step="0.01" value="0" />
          </label>

          <label>
            Number of lifts
            <input name="noOfLifts" type="number" step="1" value="1" />
          </label>

          <label>
            Facing
            <input name="facing" type="text" value="East" />
          </label>

          <label>
            Rent or sale
            <select name="RentOrSale">
              <option>Rent</option>
              <option>Sale</option>
            </select>
          </label>

          <label>
            Water storage
            <select name="Water_Storage"><option value="1">Yes</option><option value="0" selected>No</option></select>
          </label>

          <label>
            Waste disposal
            <select name="Waste_Disposal"><option value="1">Yes</option><option value="0" selected>No</option></select>
          </label>

          <label>
            Visitor parking
            <select name="Visitor_Parking"><option value="1">Yes</option><option value="0" selected>No</option></select>
          </label>

          <label>
            Vaastu compliant
            <select name="Vaastu_Compliant"><option value="1">Yes</option><option value="0" selected>No</option></select>
          </label>

          <label>
            Swimming pool
            <select name="Swimming_Pool"><option value="1">Yes</option><option value="0" selected>No</option></select>
          </label>

          <label>
            Security
            <select name="Security"><option value="1">Yes</option><option value="0" selected>No</option></select>
          </label>

          <label>
            Reserved parking
            <select name="Reserved_Parking"><option value="1">Yes</option><option value="0" selected>No</option></select>
          </label>

          <label>
            Power back up
            <select name="Power_Back_Up"><option value="1">Yes</option><option value="0" selected>No</option></select>
          </label>

          <label>
            Park
            <select name="Park"><option value="1">Yes</option><option value="0" selected>No</option></select>
          </label>

          <label>
            Gymnasium
            <select name="Gymnasium"><option value="1">Yes</option><option value="0" selected>No</option></select>
          </label>

          <button type="submit" class="submit-btn">Predict price</button>
        </form>
      </section>

      <section class="card result-card">
        <p class="result-label">Prediction</p>
        <div id="result" class="result-value">Fill the form and submit to see the estimate.</div>
      </section>
    </main>

    <script src="/static/js/app.js"></script>
  </body>
</html>
